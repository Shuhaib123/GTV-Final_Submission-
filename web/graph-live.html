<!-- web/graph_live.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GTV — Live Concurrency Replay</title>
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="live.css" />
    <script src="topology.js"></script>
    <script src="topology-builder.js"></script>
    <script src="state-machine.js"></script>
  </head>

  <body>
    <div class="toolbar">
      <button id="btnLoad">Load JSON</button>
      <input id="file" type="file" accept=".json" style="display: none" />
      <button id="btnPlay">▶︎</button>
      <button id="btnPause" disabled>⏸</button>
      <button id="btnStep" title="Step next event">⏭</button>
      <button id="btnTheme" title="Toggle theme">Theme</button>
      <button id="btnDownload" title="Download PNG">Download PNG</button>
      <span
        id="liveStatus"
        class="mini"
        style="margin-left: 8px; color: #9bd67b; display: none"
        >Live: connected</span
      >
      <label
        >Speed
        <select id="speed">
          <option value="0.25">0.25×</option>
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
          <option value="8">8×</option>
        </select>
      </label>
      <label style="flex: 1"
        >Time
        <input
          id="scrub"
          type="range"
          min="0"
          max="1000"
          value="0"
          style="width: 100%"
        />
      </label>
      <span id="clock" class="mini">t=0.000ms</span>
      <label class="mini" style="margin-left: 8px"
        >Notes <input id="toggleNotesLive" type="checkbox" /><span
          id="notesCountLive"
          class="mini"
          style="margin-left: 4px"
        ></span
      ></label>
      <label class="mini" style="margin-left: 8px"
        >Warnings <span id="warningsCountLive" class="mini" style="margin-left: 4px"></span
      ></label>
      <label class="mini" style="margin-left: 8px"
        >Labels <input id="toggleLabelsLive" type="checkbox" checked
      /></label>
      <label class="mini" style="margin-left: 8px"
        >IDs <input id="toggleIDsLive" type="checkbox"
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Synth edges <input id="toggleSynthLive" type="checkbox" checked
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Commits <input id="toggleCommitsLive" type="checkbox" checked
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Attempts <input id="toggleAttemptsLive" type="checkbox"
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Causal <input id="toggleCausalLive" type="checkbox"
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Messages only <input id="toggleMsgOnlyLive" type="checkbox"
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Split <input id="toggleSplitLive" type="checkbox"
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Bundle <input id="toggleBundleLive" type="checkbox"
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Drop unlabeled (server) <input id="toggleDropLive" type="checkbox"
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Mode
        <select id="bcModeLive">
          <option value="">(default)</option>
          <option value="buffered">buffered</option>
          <option value="blocking">blocking</option>
          <option value="both">both</option>
        </select>
      </label>
      <span id="wlLabel" class="mini" style="margin-left: 12px"></span>
      <label class="mini" style="margin-left: 8px"
        >HUD <input id="toggleHUDLive" type="checkbox" checked
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Lifecycle <input id="filterLife" type="checkbox" checked
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Blocking <input id="filterBlock" type="checkbox" checked
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Select <input id="filterSelect" type="checkbox" checked
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Lbl off
        <input
          id="lblOff"
          type="range"
          min="6"
          max="36"
          value="18"
          style="vertical-align: middle"
      /></label>
      <label class="mini" style="margin-left: 8px"
        >Curve
        <input
          id="curve"
          type="range"
          min="0"
          max="40"
          value="0"
          style="vertical-align: middle"
      /></label>
    </div>
    <div id="stage">
      <svg id="svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker
            id="arrow"
            viewBox="0 0 10 10"
            refX="10"
            refY="5"
            markerWidth="6"
            markerHeight="6"
            orient="auto-start-reverse"
          >
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f5f8a"></path>
          </marker>
        </defs>
        <g id="world">
          <g id="edges"></g>
          <g id="bundles"></g>
          <g id="causal"></g>
          <g id="anims"></g>
          <g id="nodes"></g>
          <!-- Labels above nodes so they are never occluded by node shapes -->
          <g id="labels"></g>
          <g id="notes"></g>
        </g>
      </svg>
      <div id="edgeTip" class="tooltip" style="display: none"></div>
      <div class="hud" id="hud">
        <h3>Run HUD</h3>
        <div class="mini" id="hudStats">events: 0 • duration: 0ms</div>
        <div class="mini" id="hudOpts"></div>
        <div class="mini" id="hudSel"></div>
        <div id="hudPairs" class="list"></div>
        <div id="hudBlocks" class="list"></div>
      </div>
      <div id="notesPanel" class="notes-panel"></div>
      <div id="warningsPanel" class="warnings-panel"></div>
    </div>

    <script>
      /* ======= Data types =======
                      event: {
                        time_ms:number, event:string, g?:number, channel?:string, value?:number,
                        role?:string, func?:string
                      }
                      ============================ */

      const $ = (sel) => document.querySelector(sel);
      const svg = $("#svg");
      const gWorld = $("#world");
      const gEdges = $("#edges");
      const gCausal = $("#causal");
      const gAnims = $("#anims");
      const gNodes = $("#nodes");
      const gLabels = $("#labels");
      // Map attempt_id -> select_id for HUD linking
      const attemptToSelect = new Map();
      // Select summaries for compact HUD: sid -> { chosen:string|null, dropped:string[] }
      const selectSummary = new Map();
      const gNotes = $("#notes");
      const featureFlags = (() => {
        const params = new URLSearchParams(location.search);
        const defaults = {
          enableIORegions: false,
          enableSelectScaffolding: false,
        };
        return {
          enableIORegions: params.get("io") === "1" ? true : defaults.enableIORegions,
          enableSelectScaffolding: params.get("select") === "1" ? true : defaults.enableSelectScaffolding,
          enableIORegions: params.get("io") === "1",
          enableSelectScaffolding: params.get("select") === "1",
          enableLiveBuffer: params.get("live_buffer") !== "0",
        };
      })();
      const warningsPanel = $("#warningsPanel");
      const warningsCountLive = $("#warningsCountLive");

      function escapeHtml(str = "") {
        return String(str || "").replace(/[&<>"']/g, (s) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        })[s]);
      }

      let rawEvents = [];
      let events = []; // with dt
      let allChannels = [];
      let t0 = 0,
        T = 0;
      let canonicalTopology = null;
      let topologyRebuildScheduled = false;
      function rebuildCanonicalTopology() {
        if (!window.GTVTopologyBuilder) return;
        try {
          canonicalTopology = GTVTopologyBuilder.buildTopology(events);
          window._gtvCanonicalTopology = canonicalTopology;
        } catch (err) {
          console.warn("canonical topology rebuild failed", err);
          canonicalTopology = null;
        }
      }
      function scheduleTopologyRebuild() {
        if (topologyRebuildScheduled) return;
        topologyRebuildScheduled = true;
        requestAnimationFrame(() => {
          topologyRebuildScheduled = false;
          rebuildCanonicalTopology();
        });
      }

      const state = {
        nodes: { goroutines: new Map(), channels: new Map() },
        blocked: new Map(), // g -> {start?:ms,total:ms,count:int}
        pairs: [], // {ch,val,send:{g,t},recv:{g,t}}
      };
      const channelLabelRegistry = new Map();
      const channelLabelPriorities = [
        { test: (label) => /^clientout/i.test(label), score: 5 },
        { test: (label) => /^clientin/i.test(label), score: 4 },
        { test: (label) => /^serverout/i.test(label), score: 3 },
        { test: (label) => /^serverin/i.test(label), score: 2 },
        { test: (label) => /^reg/i.test(label), score: 1 },
        { test: (label) => /^join/i.test(label), score: 0 },
      ];
      function stripGoroutineSuffix(key) {
        return GTVTopology.stripSuffix(key);
      }

      function normalizeChannelKey(key) {
        return GTVTopology.normalizeChannelKey(key);
      }
      function normalizePointer(ptr) {
        return GTVTopology.normalizePointer(ptr);
      }
      function normalizeChannelId(chId) {
        return GTVTopology.normalizeChannelId(chId);
      }
      function channelPointerFromId(chId) {
        return GTVTopology.channelPointerFromId(chId);
      }
      function shortPointer(ptr) {
        return GTVTopology.shortPointer(ptr);
      }
      function labelScore(label) {
        if (!label) return 0;
        for (const { test, score } of channelLabelPriorities) {
          if (test(label)) return score;
        }
        return 0;
      }
      function registerChannelLabel(chId, label) {
        const normalized = normalizeChannelId(chId);
        const candidate = label || normalized.replace(/^ch:/, "") || "chan";
        let info = channelLabelRegistry.get(normalized);
        if (!info) {
          info = { counts: new Map(), best: candidate };
          channelLabelRegistry.set(normalized, info);
        }
        const counts = info.counts;
        counts.set(candidate, (counts.get(candidate) || 0) + 1);
        const currentBest = info.best || candidate;
        const currentScore = labelScore(currentBest);
        const candidateScore = labelScore(candidate);
        const currentCount = counts.get(currentBest);
        const candidateCount = counts.get(candidate);
        if (
          candidateScore > currentScore ||
          (candidateScore === currentScore && candidateCount >= currentCount)
        ) {
          info.best = candidate;
        }
        return info;
      }
      function channelDisplayName(chId, label) {
        const info = registerChannelLabel(chId, label);
        const baseName = info.best || "chan";
        const ptr = channelPointerFromId(chId);
        if (ptr) {
          const suffix = shortPointer(ptr);
          return `${baseName}@${suffix}`;
        }
        return baseName;
      }
      function channelLabelCandidate(evt, fallback) {
        if (!evt) return fallback || "chan";
        if (evt.channel) return evt.channel;
        if (evt.channel_key) return evt.channel_key;
        return fallback || "chan";
      }
      function channelIdentity(evt) {
        if (!evt) return null;
        if (evt.ch_ptr) return String(evt.ch_ptr);
        if (evt.channel_key) return String(evt.channel_key);
        if (evt.channel) return String(evt.channel);
        return null;
      }
      function channelKeyForEvent(evt) {
        const identity = channelIdentity(evt);
        return identity ? normalizeChannelId(identity) : null;
      }
      function canonicalChannelId(evt) {
        if (!evt) return "ch:chan";
        if (typeof evt === "string") return normalizeChannelId(evt);
        if (evt.ch_ptr) return `ch:${evt.ch_ptr}`;
        if (evt.channel_key) return `ch:${evt.channel_key}`;
        if (evt.channel) return `ch:${evt.channel}`;
        return "ch:chan";
      }
      function tokenAnimationAllowed(evt) {
        if (!evt || typeof evt.event !== "string") return false;
        const name = evt.event.toLowerCase();
        if (name === "chan_send" || name === "chan_recv") {
          const src = String(evt.source || evt.Source || "").toLowerCase();
          if (src !== "paired") return false;
          return !!channelIdentity(evt);
        }
        if (name === "chan_send_commit" || name === "chan_recv_commit") {
          return !!channelIdentity(evt);
        }
        return false;
      }

      const ui = {
        playing: false,
        animating: true, // governs dot animations (pulses + message dots)
        speed: 1,
        scale: 1, // sim-ms per wall-ms factor (computed per trace length)
        simNow: 0,
        lastWall: 0,
        nextIdx: 0,
        scrubLock: false,
      };

      const view = { scale: 1, panX: 0, panY: 0 };
      let suppressAutoPlay = false;
      let snapshotActive = false;
      let snapshotApplied = false;
      function applyView() {
        gWorld.setAttribute(
          "transform",
          `translate(${view.panX},${view.panY}) scale(${view.scale})`
        );
      }

      // Layered deterministic layout to reduce overlap:
      // - main goroutines on the left column (x=200)
      // - channels in the middle columns (x≈500+)
      // - worker goroutines on the right column (x=900)
      // Spacing increases with index to avoid collisions.
      const laneAnchors = {
        mainX: 200,
        workerX: 900,
        channelX: 520,
      };
      const pos = {
        counts: { main: 0, worker: 0, chan: 0 },
        goroutine(role) {
          if ((role || "").toLowerCase() === "main") {
            const i = this.counts.main++;
            return { x: 200, y: 120 + i * 140 };
          }
          const i = this.counts.worker++;
          return { x: 900, y: 120 + i * 110 };
        },
        channel() {
          const i = this.counts.chan++;
          // distribute channels across two rows in the center band
          const row = i % 2,
            col = Math.floor(i / 2);
          return { x: 520 + col * 220, y: row ? 420 : 240 };
        },
      };

      /* ========= Utilities ========= */
      function format(ms) {
        return ms.toFixed(3);
      }
      let labelOffset = 18,
        edgeCurve = 40;
      function pathForEdge(x1, y1, x2, y2) {
        if (edgeCurve <= 0) return `M ${x1} ${y1} L ${x2} ${y2}`;
        const dx = x2 - x1,
          dy = y2 - y1;
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len,
          ny = dx / len;
        const cx = (x1 + x2) / 2 + nx * edgeCurve,
          cy = (y1 + y2) / 2 + ny * edgeCurve;
        return `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`;
      }
      function line(x1, y1, x2, y2) {
        const e = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "path"
        );
        e.setAttribute("d", pathForEdge(x1, y1, x2, y2));
        e.setAttribute("class", "edge");
        e.setAttribute("marker-end", "url(#arrow)");
        return e;
      }
      function pathForCurve(x1, y1, x2, y2, off = 22) {
        const dx = x2 - x1,
          dy = y2 - y1,
          len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len,
          ny = dx / len;
        const cx = (x1 + x2) / 2 + nx * off,
          cy = (y1 + y2) / 2 + ny * off;
        return `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`;
      }
      function circle(x, y, r, cls = "") {
        const c = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "circle"
        );
        c.setAttribute("cx", x);
        c.setAttribute("cy", y);
        c.setAttribute("r", r);
        if (cls) c.setAttribute("class", cls);
        return c;
      }
      function rect(x, y, w, h, rx = 8, cls = "") {
        const r = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "rect"
        );
        r.setAttribute("x", x);
        r.setAttribute("y", y);
        r.setAttribute("width", w);
        r.setAttribute("height", h);
        r.setAttribute("rx", rx);
        if (cls) r.setAttribute("class", cls);
        return r;
      }
      function text(x, y, s, anchor = "middle") {
        const t = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "text"
        );
        t.setAttribute("x", x);
        t.setAttribute("y", y);
        t.setAttribute("class", "label");
        t.setAttribute("text-anchor", anchor);
        t.textContent = s;
        return t;
      }
      // Label preferences: include IDs in edge labels
      function loadIDsPref() {
        try {
          return localStorage.getItem("gtv.edge.ids") === "1";
        } catch {
          return false;
        }
      }
      function saveIDsPref(v) {
        try {
          localStorage.setItem("gtv.edge.ids", v ? "1" : "0");
        } catch {}
      }
      let showIDsLive = loadIDsPref();
      function idsSuffix(ed) {
        if (!showIDsLive) return "";
        const a = ed && ed.attemptId ? String(ed.attemptId) : "";
        const c = ed && ed.commitId ? String(ed.commitId) : "";
        if (a || c) return ` id:${a}${c ? `→${c}` : ""}`;
        return "";
      }
      function normalizeEdgeKind(kind) {
        if (!kind) return "";
        const lower = kind.toLowerCase();
        if (lower.includes("spawn")) return "spawn";
        if (lower.includes("send")) return "send";
        if (lower.includes("recv")) return "recv";
        return kind;
      }
      function minimalEdgeLabel(kind, ch) {
        const shortKind = normalizeEdgeKind(kind) || "edge";
        return `${shortKind}${ch ? ` ${ch}` : ""}`;
      }
      function recordEdgeTiming(edObj, e) {
        if (!edObj) return;
        edObj.metaTime = e.time_ms;
        edObj.metaDelta = e.delta_ms;
        edObj.metaEvent = e.event || e.kind || "";
        edObj.metaValue = e.value;
      }

      /* ========= Build nodes ========= */
      let lastMainG = 0;
      function ensureGoroutine(g, role, f) {
        if (state.nodes.goroutines.has(g)) return state.nodes.goroutines.get(g);
        const { x, y } = pos.goroutine((role || "").toLowerCase());
        const gEl = document.createElementNS("http://www.w3.org/2000/svg", "g");
        gEl.setAttribute("class", "node g-node");
        gEl.setAttribute("data-g", String(g));
        gEl.setAttribute("transform", `translate(${x},${y})`);
        const c = circle(0, 0, 28);
        gEl.appendChild(c);
        const t = text(0, -40, `g${g} (${role || "?"})`);
        t.setAttribute("text-anchor", "middle");
        gEl.appendChild(t);
        gEl.appendChild(text(0, 4, `g${g}`, "middle"));
        gNodes.appendChild(gEl);
        const ref = {
          x,
          y,
          el: gEl,
          title: t,
          kind: "goroutine",
          id: `g${g}`,
          role: role || "worker",
          vx: 0,
          vy: 0,
          homeX: x,
          homeY: y,
        };
        // Drag & select
        makeDraggable(ref);
        makeSelectableNode(ref);
        state.nodes.goroutines.set(g, ref);
        try {
          if ((role || "").toLowerCase() === "main") lastMainG = g;
        } catch {}
        return ref;
      }
      function ensureChannel(chId, displayName) {
        const normalized = normalizeChannelId(chId);
        if (state.nodes.channels.has(normalized)) {
          const existing = state.nodes.channels.get(normalized);
          const display = channelDisplayName(normalized, displayName);
          if (display && existing.name !== display) {
            existing.name = display;
            try {
              existing.label.textContent = display;
            } catch {}
            try {
              existing.updateTitle();
            } catch {}
          }
          return existing;
        }
        const { x, y } = pos.channel();
        const gEl = document.createElementNS("http://www.w3.org/2000/svg", "g");
        gEl.setAttribute("class", "node chan");
        gEl.setAttribute("transform", `translate(${x},${y})`);
        const w = 90,
          h = 28;
        gEl.appendChild(rect(-45, -14, w, h, 6, "chan"));
        const name = channelDisplayName(normalized, displayName);
        const t = text(0, 4, name, "middle");
        gEl.appendChild(t);
        // Queue indicator group under the channel
        const qg = document.createElementNS("http://www.w3.org/2000/svg", "g");
        qg.setAttribute("transform", `translate(0,22)`);
        gEl.appendChild(qg);
        const title = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "title"
        );
        title.textContent = `channel ${name}`;
        gEl.appendChild(title);
        gNodes.appendChild(gEl);
        const ptr = channelPointerFromId(normalized);
        const ref = {
          x,
          y,
          el: gEl,
          kind: "channel",
          id: `ch_${normalized}`,
          label: t,
          titleEl: title,
          name: name,
          cap: undefined,
          elemType: undefined,
          ptr: ptr,
          depth: 0,
          qg,
          vx: 0,
          vy: 0,
          homeX: x,
          homeY: y,
        };
        ref.updateTitle = function () {
          try {
            ref.titleEl.textContent = `channel ${ref.name}${
              ref.elemType ? ` (${ref.elemType})` : ""
            }${ref.cap != null ? ` cap=${ref.cap}` : ""}${
              ref.ptr ? ` • ptr=${ref.ptr}` : ""
            }${ref.cap > 0 ? ` • depth=${ref.depth || 0}` : ""}`;
          } catch {}
        };
        ref.updateQueue = function () {
          try {
            while (qg.firstChild) qg.removeChild(qg.firstChild);
            if (!(ref.cap > 0)) return;
            const maxDiscrete = 12;
            if (ref.cap <= maxDiscrete) {
              const size = 6,
                gap = 2;
              const totalW = ref.cap * size + (ref.cap - 1) * gap;
              let x0 = -totalW / 2 + size / 2;
              for (let i = 0; i < ref.cap; i++) {
                const r = circle(x0, 0, 3);
                r.setAttribute(
                  "fill",
                  i < (ref.depth || 0) ? "#8bc34a" : "#3b476d"
                );
                qg.appendChild(r);
                x0 += size + gap;
              }
            } else {
              const W = 84,
                H = 6;
              const x = -W / 2,
                y = -H / 2;
              const bg = rect(x, y, W, H, 2, "");
              bg.setAttribute("fill", "#3b476d");
              qg.appendChild(bg);
              const fillW = Math.max(
                0,
                Math.min(W, W * ((ref.depth || 0) / ref.cap))
              );
              const fg = rect(x, y, fillW, H, 2, "");
              fg.setAttribute("fill", "#8bc34a");
              qg.appendChild(fg);
            }
          } catch {}
        };
        try {
          ref.updateQueue();
        } catch {}
        try {
          ref.updateTitle();
        } catch {}
        makeDraggable(ref);
        makeSelectableNode(ref);
        state.nodes.channels.set(normalized, ref);
        return ref;
      }

      /* ========= Notes ========= */
      function addNote(label, tms, cat = "lifecycle", g = null) {
        const panel = document.getElementById("notesPanel");
        if (!panel) return; // panel may be hidden or not present; avoid halting playback
        const div = document.createElement("div");
        div.className = "note-card";
        div.dataset.cat = cat;
        if (g != null) div.dataset.g = String(g);
        const title = document.createElement("div");
        title.className = "title";
        title.textContent = label + (g != null ? ` (g${g})` : ``);
        div.appendChild(title);
        const ts = document.createElement("div");
        ts.textContent = `t=${format(tms)}ms`;
        div.appendChild(ts);
        panel.appendChild(div);
        panel.scrollTop = panel.scrollHeight;
        // Update hidden-count badge when notes are off
        try {
          const badge = document.getElementById("notesCountLive");
          const on = document.getElementById("toggleNotesLive")?.checked;
          const n = panel.querySelectorAll(".note-card").length;
          if (badge) badge.textContent = !on && n > 0 ? `(hidden: ${n})` : "";
        } catch {}
      }

      /* ========= Animations ========= */
      let activeTokenDot = null;
      function animateDot(x1, y1, x2, y2, kind = "send", durMs = 400) {
        if (activeTokenDot) {
          try {
            activeTokenDot.remove();
          } catch {}
          activeTokenDot = null;
        }
        const dot = circle(x1, y1, 5, `dot ${kind}`);
        activeTokenDot = dot;
        gAnims.appendChild(dot);
        let last = performance.now();
        let elapsed = 0; // only accumulates when ui.animating is true
        function step(now) {
          if (!ui.animating) {
            last = now;
            requestAnimationFrame(step);
            return;
          }
          elapsed += now - last;
          last = now;
          const p = Math.min(1, elapsed / durMs);
          const x = x1 + (x2 - x1) * p,
            y = y1 + (y2 - y1) * p;
          dot.setAttribute("cx", x);
          dot.setAttribute("cy", y);
          if (p < 1) requestAnimationFrame(step);
          else {
            dot.remove();
            if (activeTokenDot === dot) activeTokenDot = null;
          }
        }
        requestAnimationFrame(step);
      }
      // Keep a list of drawn edges so dragging nodes updates them.
      const drawnEdges = [];
      const spawnEdges = [];
      const causalEdges = [];
      const attemptEdges = new Map(); // attempt_id -> edge object
      // Quick lookup for edges by (kind,gid,channel) so we can decorate them (e.g., when blocked)
      const pendingRecvCommits = new Map(); // attempt_id -> commit event waiting for its attempt edge
      const edgesByKey = new Map(); // key: `${kind}:${g}:${ch}` => edObj
      // Remember which specific edge (g,ch,kind) is currently marked blocked
      const blockedEdgeByKey = new Map(); // `${g}:${ch}:${kind}` -> edObj
      // Intent captured at blocked_* time before we see the actual edge event
      const blockedIntentByKey = new Set(); // keys `${g}:${ch}:${kind}`
      const stateMachine = window.GTVStateMachine?.createStateMachine({
        ui,
        gAnims,
        circle,
        drawnEdges,
      });
      const animateDot =
        stateMachine?.animateDot ||
        function () {
          return;
        };
      const startFlowLoop =
        stateMachine?.startFlowLoop ||
        function () {
          return;
        };
      const stopFlowLoop =
        stateMachine?.stopFlowLoop ||
        function () {
          return;
        };
      // Bundling overlay updater
      function groupKey(ref) {
        const f = String(ref.func || "");
        const parts = f.split(".");
        if (parts.length >= 2) return parts.slice(-2).join(".");
        if (parts.length === 1 && parts[0]) return parts[0];
        return String(ref.role || "worker");
      }
      function updateBundles() {
        const pref = (function () {
          const el = document.getElementById("toggleBundleLive");
          return el && el.checked;
        })();
        const auto =
          !pref && view && typeof view.scale === "number"
            ? view.scale <= 0.65
            : false;
        const on = pref || auto;
        const layer = document.getElementById("bundles");
        if (!layer) return;
        layer.innerHTML = "";
        if (!on) {
          try {
            layer.style.display = "none";
          } catch {}
          return;
        } else {
          try {
            layer.style.display = "";
          } catch {}
        }
        const counts = new Map();
        drawnEdges.forEach((ed) => {
          if (!ed || (ed.kind !== "send" && ed.kind !== "recv")) return;
          let gref = ed.kind === "send" ? ed.a : ed.b;
          if (!gref || gref.kind !== "goroutine") return;
          const group = groupKey(gref);
          const ch = ed.kind === "send" ? ed.b : ed.a;
          if (!ch || ch.kind !== "channel") return;
          const key = ed.kind + "|" + group + "|" + (ch.id || "");
          counts.set(key, (counts.get(key) || 0) + 1);
        });
        counts.forEach((cnt, k) => {
          const [kind, group, chId] = k.split("|");
          // group centroid
          let sx = 0,
            sy = 0,
            n = 0;
          state.nodes.goroutines.forEach((ref) => {
            if (groupKey(ref) === group) {
              sx += ref.x;
              sy += ref.y;
              n++;
            }
          });
          if (n === 0) return;
          const a = { x: sx / n, y: sy / n };
          // channel ref
          let target = null;
          state.nodes.channels.forEach((ref) => {
            if (String(ref.id) === String(chId)) target = ref;
          });
          if (!target) return;
          const x1 = kind === "send" ? a.x : target.x;
          const y1 = kind === "send" ? a.y : target.y;
          const x2 = kind === "send" ? target.x : a.x;
          const y2 = kind === "send" ? target.y : a.y;
          const p = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path"
          );
          p.setAttribute("class", "edge bundle");
          p.setAttribute("d", pathForCurve(x1, y1, x2, y2, 22));
          layer.appendChild(p);
          const lbl = text((x1 + x2) / 2, (y1 + y2) / 2 - 10, String(cnt));
          layer.appendChild(lbl);
        });
      }
      function updateEdge(e) {
        const ax = e.a.x,
          ay = e.a.y,
          bx = e.b.x,
          by = e.b.y;
        // Update the path with per-edge curvature to fan out siblings
        const dx = bx - ax,
          dy = by - ay;
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len,
          ny = dx / len;
        const mx = (ax + bx) / 2,
          my = (ay + by) / 2;
        const c = Math.max(0, (edgeCurve || 0) + (e.curve || 0));
        if (c <= 0) {
          e.path.setAttribute("d", `M ${ax} ${ay} L ${bx} ${by}`);
        } else {
          const cx = mx + nx * c,
            cy = my + ny * c;
          e.path.setAttribute("d", `M ${ax} ${ay} Q ${cx} ${cy} ${bx} ${by}`);
        }

        // Compute label anchor on the actual path (midpoint) and its normal.
        try {
          const L = Math.max(1, e.path.getTotalLength());
          const mid = e.path.getPointAtLength(L / 2);
          const p1 = e.path.getPointAtLength(Math.max(0, L / 2 - 1));
          const p2 = e.path.getPointAtLength(Math.min(L, L / 2 + 1));
          const tx = p2.x - p1.x,
            ty = p2.y - p1.y;
          const tlen = Math.hypot(tx, ty) || 1;
          // Perpendicular unit normal
          e.nx = -ty / tlen;
          e.ny = tx / tlen;
          e.mx = mid.x;
          e.my = mid.y;
        } catch {
          // Fallback to straight chord if SVG APIs fail
          const dx = bx - ax,
            dy = by - ay;
          const len = Math.hypot(dx, dy) || 1;
          e.nx = -dy / len;
          e.ny = dx / len;
          e.mx = (ax + bx) / 2;
          e.my = (ay + by) / 2;
        }

        // Base offset in world units, with current per-edge shift applied
        let off = labelOffset + (e.shift || 0);

        // Avoid covering the notes panel (right side) – compute in screen space and clamp push.
        // Skip this while dragging to avoid jitter/runaway near the pointer.
        if (!draggingAny)
          try {
            const rect = svg.getBoundingClientRect();
            const notes = document.getElementById("notesPanel");
            const nrect =
              notes && notes.style.display !== "none"
                ? notes.getBoundingClientRect()
                : null;
            const rightLimit = nrect ? nrect.left - 8 : rect.width - 8;
            const leftLimit = 8;
            const screenMidX = view.scale * e.mx + view.panX;
            const testX = screenMidX + e.nx * off * view.scale;
            const MAX_PUSH_SCR = 160; // px, clamp panel push
            if (testX > rightLimit) {
              const need = Math.min(MAX_PUSH_SCR, screenMidX - rightLimit + 12);
              off = -Math.max(Math.abs(off), need / view.scale);
            } else if (testX < leftLimit) {
              const need = Math.min(MAX_PUSH_SCR, leftLimit - testX + 12);
              off = Math.max(Math.abs(off), need / view.scale);
            }
          } catch {}

        e.label.setAttribute("x", e.mx + e.nx * off);
        e.label.setAttribute("y", e.my + e.ny * off);
      }
      let draggingAny = false;
      function updateEdgesForNode(n) {
        for (const ed of drawnEdges)
          if (ed.a === n || ed.b === n) updateEdge(ed);
        for (const ed of spawnEdges)
          if (ed.a === n || ed.b === n) updateEdge(ed);
        for (const ed of causalEdges)
          if (ed.a === n || ed.b === n) updateEdge(ed);
        try {
          updateBundles();
        } catch {}
        if (!draggingAny) resolveLabelOverlaps();
      }

      // Attempt to resolve overlapping labels by nudging them along their perpendicular normal.
      function resolveLabelOverlaps() {
        // Reset shifts each pass to avoid drift from previous interactions.
        drawnEdges.forEach((ed) => {
          ed.shift = 0;
        });
        const items = drawnEdges.map((ed) => ({ ed, bb: ed.label.getBBox() }));
        // Run several passes to spread clusters symmetrically.
        const MAX_SHIFT_SCR = 120; // max 120px in screen space
        for (let pass = 0; pass < 4; pass++) {
          for (let i = 0; i < items.length; i++) {
            for (let j = i + 1; j < items.length; j++) {
              const a = items[i],
                b = items[j];
              if (overlaps(a.bb, b.bb)) {
                // Push both apart a bit along their normals.
                const pushW = labelOffset / 2;
                const maxW = MAX_SHIFT_SCR / Math.max(0.1, view.scale);
                const edA = a.ed,
                  edB = b.ed;
                edA.shift = Math.max(
                  -maxW,
                  Math.min(maxW, (edA.shift || 0) - pushW)
                );
                edB.shift = Math.max(
                  -maxW,
                  Math.min(maxW, (edB.shift || 0) + pushW)
                );
                edA.label.setAttribute(
                  "x",
                  edA.mx + edA.nx * (labelOffset + edA.shift)
                );
                edA.label.setAttribute(
                  "y",
                  edA.my + edA.ny * (labelOffset + edA.shift)
                );
                edB.label.setAttribute(
                  "x",
                  edB.mx + edB.nx * (labelOffset + edB.shift)
                );
                edB.label.setAttribute(
                  "y",
                  edB.my + edB.ny * (labelOffset + edB.shift)
                );
                a.bb = edA.label.getBBox();
                b.bb = edB.label.getBBox();
              }
            }
          }
        }
        function overlaps(a, b) {
          return !(
            a.x + a.width < b.x ||
            b.x + b.width < a.x ||
            a.y + a.height < b.y ||
            b.y + b.height < a.y
          );
        }
      }

      /* ========= Pairing (order-agnostic) ========= */
      const pending = { sends: new Map(), recvs: new Map() };
      function qFor(map, ch) {
        let q = map.get(ch);
        if (!q) {
          q = [];
          map.set(ch, q);
        }
        return q;
      }
      function onSend(ch, g, t, val) {
        const rq = qFor(pending.recvs, ch);
        if (rq.length) {
          const r = rq.shift();
          state.pairs.push({
            ch,
            val: r.val ?? val ?? null,
            send: { g, t },
            recv: { g: r.g, t: r.t },
          });
          updatePairsHUD();
        } else {
          qFor(pending.sends, ch).push({ g, t, val });
        }
      }
      function onRecv(ch, g, t, val) {
        const sq = qFor(pending.sends, ch);
        if (sq.length) {
          const s = sq.shift();
          state.pairs.push({
            ch,
            val: val ?? s.val ?? null,
            send: { g: s.g, t: s.t },
            recv: { g, t },
          });
          updatePairsHUD();
        } else {
          qFor(pending.recvs, ch).push({ g, t, val });
        }
      }

      /* ========= Blocking accumulation ========= */
      function onBlocked(g, t) {
        let b = state.blocked.get(g);
        if (!b) {
          b = { total: 0, count: 0, start: undefined };
          state.blocked.set(g, b);
        }
        if (b.start == null) b.start = t;
        const node = state.nodes.goroutines.get(g);
        if (node) node.el.classList.add("blocked");
        updateBlocksHUD();
      }
      function onUnblocked(g, t) {
        const b = state.blocked.get(g);
        if (!b) return;
        if (b.start != null) {
          b.total += t - b.start;
          b.count += 1;
          b.start = undefined;
        }
        const node = state.nodes.goroutines.get(g);
        if (node) node.el.classList.remove("blocked");
        updateBlocksHUD();
      }

      /* ========= HUD ========= */
      function updatePairsHUD() {
        const el = $("#hudPairs");
        el.innerHTML = "";
        state.pairs.slice(-6).forEach((p, i) => {
          const d = document.createElement("div");
          d.className = "pill";
          d.textContent = `${p.ch} v=${p.val ?? "?"} Δ=${format(
            p.recv.t - p.send.t
          )}ms`;
          el.appendChild(d);
        });
      }
      function updateBlocksHUD() {
        const el = $("#hudBlocks");
        el.innerHTML = "";
        [...state.blocked.entries()].forEach(([g, b]) => {
          const d = document.createElement("div");
          d.className = "pill";
          const live = b.start != null ? " (live)" : "";
          d.textContent = `g${g} blocked=${b.count} total=${format(
            b.total
          )}ms${live}`;
          el.appendChild(d);
        });
      }

      /* ========= Playback engine ========= */
      function resetAll() {
        ui.simNow = 0;
        ui.nextIdx = 0;
        $("#clock").textContent = `t=0.000ms`;
        gEdges.innerHTML = "";
        gAnims.innerHTML = "";
        activeTokenDot = null;
        gNodes.innerHTML = "";
        gLabels.innerHTML = "";
        gNotes.innerHTML = "";
        state.nodes.goroutines.clear();
        state.nodes.channels.clear();
        state.blocked.clear();
        state.pairs = [];
        // Reset layout counters and any cached edge geometry
        try {
          pos.counts.main = 0;
          pos.counts.worker = 0;
          pos.counts.chan = 0;
        } catch {}
        try {
          drawnEdges.length = 0;
        } catch {}
        // Clear pairing/lookup state
        pending.sends.clear();
        pending.recvs.clear();
        edgesByKey.clear();
        blockedEdgeByKey.clear();
        blockedIntentByKey.clear();
      }

      function rebuildSceneFromEvents() {
        if (!events.length) return;
        const wasPlaying = ui.playing;
        stopFlowLoop();
        resetAll();
        events.forEach((ev) => fire(ev, /*animate*/ false));
        ui.simNow = T;
        ui.nextIdx = events.length;
        $("#clock").textContent = `t=${format(ui.simNow)}ms`;
        $("#scrub").value = Math.floor((ui.simNow / T) * 1000);
        if (wasPlaying) startFlowLoop();
      }

      // Ensure goroutine + channel nodes exist based on the loaded events
      function seedScene() {
        const gs = Array.from(
          new Set(events.map((e) => e.g).filter((g) => g != null))
        );
        const chs = new Set();
        events.forEach((e) => {
          const chId = canonicalChannelId(e);
          if (chId) chs.add(chId);
        });
        gs.forEach((g) => ensureGoroutine(g, undefined, undefined));
        chs.forEach((c) => ensureChannel(c));
      }

      function fastForwardTo(msTarget) {
        resetAll();
        for (let i = 0; i < events.length; i++) {
          const e = events[i];
          if (e.dt > msTarget) {
            ui.nextIdx = i;
            break;
          }
          fire(e, /*animate*/ false);
          ui.nextIdx = i + 1;
        }
        ui.simNow = msTarget;
        $("#clock").textContent = `t=${format(ui.simNow)}ms`;
      }

      function loop(nowWall) {
        if (!ui.playing) return;
        const dtWall = nowWall - ui.lastWall;
        ui.lastWall = nowWall;
        // Convert real time to simulated trace time with scale and speed.
        const dtSim = dtWall * ui.scale * ui.speed;
        ui.simNow = Math.min(T, ui.simNow + dtSim);
        $("#clock").textContent = `t=${format(ui.simNow)}ms`;
        $("#scrub").value = Math.floor((ui.simNow / T) * 1000);

        // fire due events (at most a small batch per frame, and only one "note" event
        // per frame to make early annotations readable)
        const isNote = (ev) =>
          ev.event === "channels_created" ||
          ev.event === "worker_starting" ||
          ev.event === "goroutine_created" ||
          ev.event === "blocked_send" ||
          ev.event === "blocked_receive" ||
          ev.event === "unblocked";
        let fired = 0,
          MAX_BATCH = 4;
        while (
          ui.nextIdx < events.length &&
          events[ui.nextIdx].dt <= ui.simNow
        ) {
          const evn = events[ui.nextIdx];
          fire(evn, /*animate*/ true);
          ui.nextIdx++;
          fired++;
          if (isNote(evn)) break; // throttle notes to one per frame
          if (fired >= MAX_BATCH) break; // avoid huge bursts per frame
        }
        if (ui.simNow >= T) {
          // Drain any remaining events <= T so the final state is complete.
          while (ui.nextIdx < events.length && events[ui.nextIdx].dt <= T) {
            fire(events[ui.nextIdx], /*animate*/ true);
            ui.nextIdx++;
          }
          setPlaying(false);
          startFlowLoop();
          return;
        }
        applyLaneForces(Math.min(50, dtWall));
        requestAnimationFrame(loop);
      }

      function setPlaying(p) {
        // toggle play; stop flow loop when playing
        ui.playing = p;
        $("#btnPlay").disabled = p;
        // Keep Pause enabled at all times so it can stop post-run pulses too
        $("#btnPause").disabled = false;
        if (p) {
          // If already at end, restart from the beginning for a full replay
          const AT_END = ui.nextIdx >= events.length || ui.simNow >= T - 1e-6;
          if (AT_END) {
            // Hard reset to t=0 but keep nodes/notes; we only reset sim state
            resetAll();
          }
          stopFlowLoop();
          ui.lastWall = performance.now();
          requestAnimationFrame(loop);
        } else {
          // Pausing should also stop any background flow pulses
          stopFlowLoop();
        }
      }

      function laneTarget(ref) {
        if (!ref) return { x: ref?.x ?? 0, y: ref?.y ?? 0 };
        if (ref.kind === "channel") {
          return { x: laneAnchors.channelX, y: ref.homeY ?? ref.y };
        }
        if (ref.kind === "goroutine") {
          const role = (ref.role || "").toLowerCase();
          if (role === "main" || role.startsWith("main")) {
            return { x: laneAnchors.mainX, y: ref.homeY ?? ref.y };
          }
          return { x: laneAnchors.workerX, y: ref.homeY ?? ref.y };
        }
        return { x: ref.homeX ?? ref.x, y: ref.homeY ?? ref.y };
      }

      function applyLaneForces(dt) {
        if (draggingAny) return;
        const nodes = [
          ...state.nodes.goroutines.values(),
          ...state.nodes.channels.values(),
        ];
        if (!nodes.length) return;
        const strength = Math.min(0.024, 0.006 * (dt / 16));
        nodes.forEach((n) => {
          const target = laneTarget(n);
          n.vx = (n.vx || 0) + (target.x - n.x) * strength;
          n.vy = (n.vy || 0) + (target.y - n.y) * strength;
        });
        const repel = 900 * (dt / 16);
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const a = nodes[i],
              b = nodes[j];
            const dx = a.x - b.x,
              dy = a.y - b.y;
            const dist2 = dx * dx + dy * dy;
            if (dist2 === 0) continue;
            const minDist = 48;
            if (dist2 < minDist * minDist) {
              const mag = Math.sqrt(dist2);
              const force = repel / Math.max(1, mag);
              const fx = (dx / mag) * force;
              const fy = (dy / mag) * force;
              a.vx += fx;
              a.vy += fy;
              b.vx -= fx;
              b.vy -= fy;
            }
          }
        }
        nodes.forEach((n) => {
          n.vx = (n.vx || 0) * 0.78;
          n.vy = (n.vy || 0) * 0.78;
          n.x += n.vx;
          n.y += n.vy;
          n.el.setAttribute("transform", `translate(${n.x},${n.y})`);
          updateEdgesForNode(n);
        });
      }

      // Draw topology edges only for paired chan_send/chan_recv events (attempts/commits stay diagnostic).
      function handleTopologyEvent(e, animate) {
        if (e && e.diagnostic_only) return false;
        const info = GTVTopologyBuilder.topologyEventMeta(e);
        if (!info) return false;
        if (typeof e.g !== "number") return false;
        const role = info.role;
        const identity = info.identity;
        const chKey = normalizeChannelId(identity);
        const key = `${role}:${e.g}:${chKey}`;
        let edObj = edgesByKey.get(key);
        const chLabel = info.chLabel || channelLabelCandidate(e, "chan");
        const chId = canonicalChannelId(e);
        const ch = ensureChannel(chId, chLabel);
        const gg = ensureGoroutine(e.g, e.role || "?", e.func);
        if (!edObj) {
          const edge = line(gg.x, gg.y, ch.x, ch.y);
          gEdges.appendChild(edge);
          const base = minimalEdgeLabel(e.event, chLabel);
          const lbl = text(0, 0, base);
          lbl.setAttribute("text-anchor", "middle");
          gLabels.appendChild(lbl);
          const a = role === "send" ? gg : ch;
          const b = role === "send" ? ch : gg;
          edObj = {
            path: edge,
            label: lbl,
            a,
            b,
            kind: role,
            ch: chLabel,
            chKey,
            g: e.g,
            baseText: base,
            ptr: e.ch_ptr || null,
          };
          edge._ed = edObj;
          lbl._ed = edObj;
          drawnEdges.push(edObj);
          edgesByKey.set(key, edObj);
          edObj.label.textContent = edObj.baseText + idsSuffix(edObj);
          recordEdgeTiming(edObj, e);
          updateEdge(edObj);
          const binfo = state.blocked.get(e.g);
          const bk = `${e.g}:${edObj.chKey}:${edObj.kind}`;
          if (binfo && binfo.start != null && blockedIntentByKey.has(bk)) {
            edObj.path.classList.add("blocked");
            blockedEdgeByKey.set(bk, edObj);
          }
          makeSelectableEdge(edge, lbl);
          resolveLabelOverlaps();
        } else {
          recordEdgeTiming(edObj, e);
        }
        if (animate && edObj && tokenAnimationAllowed(e)) {
          if (role === "send")
            animateDot(edObj.a.x, edObj.a.y, edObj.b.x, edObj.b.y, "send", 350);
          else
            animateDot(edObj.b.x, edObj.b.y, edObj.a.x, edObj.a.y, "recv", 350);
        }
        const chNameEff = chLabel || identity;
        if (role === "send") onSend(chNameEff, e.g, e.dt, e.value);
        else onRecv(chNameEff, e.g, e.dt, e.value);
        return true;
      }

      function isSelectEvent(kind) {
        return typeof kind === "string" && kind.startsWith("select_");
      }
      function isIORegionEvent(kind) {
        if (typeof kind !== "string") return false;
        return (
          kind === "chan_send_attempt" ||
          kind === "chan_recv_attempt" ||
          kind === "chan_send_commit" ||
          kind === "chan_recv_commit" ||
          kind === "send_attempt" ||
          kind === "recv_attempt" ||
          kind === "send_complete" ||
          kind === "recv_complete" ||
          kind === "chan_depth"
        );
      }
      function fire(e, animate) {
        if (e && e.diagnostic_only) return;
        const kind = e.event;
        const t = e.dt;
        if (typeof kind !== "string") return;
        const kindLower = kind.toLowerCase();
        if (!featureFlags.enableSelectScaffolding && isSelectEvent(kindLower)) {
          return;
        }
        if (!featureFlags.enableIORegions && isIORegionEvent(kindLower)) {
          return;
        }
        if (handleTopologyEvent(e, animate)) return;
        // helper: classify channel ops including attempt/complete variants
        const classify = (k, ch) => {
          // returns {is:false} if not a channel op
          const m1 = /^(ping|pong)_(send|recv)(?:_(attempt|complete))?$/.exec(
            k
          );
          if (m1)
            return {
              is: true,
              role: m1[2],
              phase: m1[3] || "plain",
              ch: ch || m1[1],
            };
          const m2 = /^(send|recv)_(attempt|complete)$/.exec(k);
          if (m2)
            return { is: true, role: m2[1], phase: m2[2], ch: ch || null };
          const m3 = /^chan_(send|recv)_(attempt|commit)$/.exec(k);
          if (m3)
            return {
              is: true,
              role: m3[1],
              phase: m3[2] === "commit" ? "complete" : "attempt",
              ch: ch || null,
              atomic: true,
            };
          return { is: false };
        };
        switch (kind) {
          case "go_start": {
            const child = ensureGoroutine(e.g, e.role || "worker", e.func);
            let pg = e.parent_g || 0;
            if (!pg && lastMainG && lastMainG !== e.g) pg = lastMainG; // heuristic parent
            if (pg) {
              const par = ensureGoroutine(pg, "main", null);
              const edge = line(par.x, par.y, child.x, child.y);
              edge.classList.add("spawn");
              gEdges.appendChild(edge);
              const lbl = text(
                (par.x + child.x) / 2,
                (par.y + child.y) / 2,
                "spawn"
              );
              gLabels.appendChild(lbl);
              const edObj = {
                path: edge,
                label: lbl,
                a: par,
                b: child,
                kind: "spawn",
                baseText: "spawn",
              };
              edge._ed = edObj;
              lbl._ed = edObj;
              makeSelectableEdge(edge, lbl);
              spawnEdges.push(edObj);
              updateEdge(edObj);
            }
            break;
          }
          case "channels_created":
            addNote("channels_created", e.time_ms, "lifecycle");
            // Show main goroutine (creator) and pre-create all channels now
            if (e.g != null) ensureGoroutine(e.g, e.role || "main", e.func);
            for (const ch of allChannels) ensureChannel(ch);
            break;
          case "chan_close": {
            const chId = canonicalChannelId(e);
            const label = channelLabelCandidate(e, "chan");
            const ch = ensureChannel(chId, label);
            try {
              ch.closed = true;
              ch.updateTitle();
            } catch {}
            addNote(`chan_close ${ch.name || chId}`, e.time_ms, "lifecycle");
            break;
          }
          case "select_begin":
            addNote(
              `select_begin id=${e.select_id || ""}`,
              e.time_ms,
              "select",
              e.g || null
            );
            break;
          case "select_chosen":
            addNote(
              `select_chosen id=${e.select_id || ""}${
                e.attempt_id ? ` aid=${e.attempt_id}` : ""
              }`,
              e.time_ms,
              "select",
              e.g || null
            );
            try {
              if (e.attempt_id)
                attemptToSelect.set(e.attempt_id, e.select_id || "");
              const sid = e.select_id || "";
              if (sid) {
                if (!selectSummary.has(sid))
                  selectSummary.set(sid, { chosen: null, dropped: [] });
                const sum = selectSummary.get(sid);
                sum.chosen = e.attempt_id || "";
              }
            } catch {}
            break;
          case "select_end":
            addNote(
              `select_end id=${e.select_id || ""}`,
              e.time_ms,
              "select",
              e.g || null
            );
            break;
          case "select_dropped":
            addNote(
              `select_dropped id=${e.select_id || ""}${
                e.attempt_id ? ` aid=${e.attempt_id}` : ""
              }`,
              e.time_ms,
              "select",
              e.g || null
            );
            try {
              if (e.attempt_id)
                attemptToSelect.set(e.attempt_id, e.select_id || "");
              const aid = e.attempt_id || "";
              if (aid && attemptEdges.has(aid)) {
                const ed = attemptEdges.get(aid);
                ed.dropped = true;
                ed.label.textContent =
                  (ed.baseText || ed.label.textContent) +
                  " dropped" +
                  idsSuffix(ed);
                ed.path.classList.add("dropped");
                updateEdge(ed);
                resolveLabelOverlaps();
              }
            } catch {}
            break;
          case "worker_starting":
            addNote("worker_starting", e.time_ms, "lifecycle");
            break;
          case "goroutine_created":
            ensureGoroutine(e.g, e.role || "worker", e.func);
            addNote(
              `goroutine_created func=${e.func || ""}`,
              e.time_ms,
              "lifecycle"
            );
            break;
          case "blocked_send":
          case "blocked_receive":
            ensureGoroutine(e.g, e.role || "?", e.func);
            onBlocked(e.g, t);
            addNote(kind, e.time_ms, "blocking", e.g);
            // Capture intent for edge-level blocked decoration (only if channel is explicit)
            try {
              const chKey = channelKeyForEvent(e);
              if (chKey) {
                const kind2 = kind.endsWith("send") ? "send" : "recv";
                const bk = `${e.g}:${chKey}:${kind2}`;
                blockedIntentByKey.add(bk);
                // If the edge already exists (e.g., blocked_receive after recv drawn), decorate now
                const edNow = edgesByKey.get(`${kind2}:${e.g}:${chKey}`);
                const binfo = state.blocked.get(e.g);
                if (edNow && binfo && binfo.start != null) {
                  edNow.path.classList.add("blocked");
                  blockedEdgeByKey.set(bk, edNow);
                }
              }
            } catch {}
            break;
          case "unblocked":
            ensureGoroutine(e.g, e.role || "?", e.func);
            onUnblocked(e.g, t);
            addNote("unblocked", e.time_ms, "blocking", e.g);
            // Clear decoration for this g+channel if known; otherwise clear all for g
            (function () {
              const ch = channelKeyForEvent(e);
              const kinds = ["send", "recv"];
              if (ch) {
                kinds.forEach((k) => {
                  const bk = `${e.g}:${ch}:${k}`;
                  const ed = blockedEdgeByKey.get(bk);
                  if (ed) {
                    ed.path.classList.remove("blocked");
                    blockedEdgeByKey.delete(bk);
                  }
                  blockedIntentByKey.delete(bk);
                });
              } else {
                // clear all keys for this goroutine
                [...blockedEdgeByKey.keys()].forEach((k) => {
                  if (k.startsWith(`${e.g}:`)) {
                    const ed = blockedEdgeByKey.get(k);
                    if (ed) ed.path.classList.remove("blocked");
                    blockedEdgeByKey.delete(k);
                  }
                });
                [...blockedIntentByKey].forEach((k) => {
                  if (k.startsWith(`${e.g}:`)) blockedIntentByKey.delete(k);
                });
              }
            })();
            break;
          case "chan_make": {
            // Update/create channel metadata (capacity/type) and exit
            const chId = canonicalChannelId(e);
            const label = channelLabelCandidate(e, "chan");
            const ch = ensureChannel(chId, label);
            try {
              if (typeof e.cap === "number") ch.cap = e.cap;
            } catch {}
            try {
              if (e.elem_type) ch.elemType = e.elem_type;
            } catch {}
            try {
              ch.updateQueue();
              ch.updateTitle();
            } catch {}
            break;
          }
          case "chan_depth": {
            const chId = canonicalChannelId(e);
            const label = channelLabelCandidate(e, "chan");
            const ch = ensureChannel(chId, label);
            try {
              ch.depth = Number(e.value) || 0;
            } catch {
              ch.depth = 0;
            }
            try {
              ch.updateQueue();
              ch.updateTitle();
            } catch {}
            break;
          }
          default: {
            const meta = classify(kind, e.channel);
            if (!meta.is) break;
            const chNameEff = meta.ch || chName(e);
            const chId = canonicalChannelId(e);
            const label = channelLabelCandidate(e, chNameEff);
            const ch = ensureChannel(chId, label);
            const gg = ensureGoroutine(e.g, e.role || "?", e.func);
            // Stable channel identity used for edge indexing
            const chKey = normalizeChannelId(canonicalChannelId(e));

            // Atomic fast-paths
            if (kind === "chan_send_commit") {
              // Upgrade existing attempt edge or create if missing
              let edObj = null;
              if (e.attempt_id && attemptEdges.has(e.attempt_id)) {
                edObj = attemptEdges.get(e.attempt_id);
                try {
                  edObj.path.classList.remove("tentative");
                  edObj.path.classList.add("commit");
                } catch {}
                const base = minimalEdgeLabel("chan_send_commit", chNameEff);
                try {
                  edObj.baseText = base;
                  edObj.label.textContent = edObj.baseText + idsSuffix(edObj);
                  recordEdgeTiming(edObj, e);
                } catch {}
                edObj.commitId = e.id || "";
                attemptEdges.delete(e.attempt_id);
                updateEdge(edObj);
                resolveLabelOverlaps();
                break;
              }
              // Fallback: draw as a final send edge
              const key = `send:${e.g}:${chKey}`;
              edObj = edgesByKey.get(key);
              if (!edObj) {
                const edge = line(gg.x, gg.y, ch.x, ch.y);
                gEdges.appendChild(edge);
                const base = minimalEdgeLabel("chan_send_commit", chNameEff);
                const lbl = text((gg.x + ch.x) / 2, (gg.y + ch.y) / 2, base);
                gLabels.appendChild(lbl);
                edObj = {
                  path: edge,
                  label: lbl,
                  a: gg,
                  b: ch,
                  kind: "send",
                  ch: chNameEff,
                  chKey,
                  g: e.g,
                  baseText: base,
                };
                edge._ed = edObj;
                lbl._ed = edObj;
                drawnEdges.push(edObj);
                edgesByKey.set(key, edObj);
                edObj.label.textContent = edObj.baseText + idsSuffix(edObj);
                updateEdge(edObj);
                resolveLabelOverlaps();
                recordEdgeTiming(edObj, e);
              }
              break;
            }
            if (kind === "chan_recv_commit") {
              // Prefer drawing the send side if peer_g is known
              if (e.peer_g) {
                const sender = ensureGoroutine(e.peer_g, "worker", null);
                const key = `send:${e.peer_g}:${chKey}`;
                let edObj = edgesByKey.get(key);
                if (!edObj) {
                  const edge = line(sender.x, sender.y, ch.x, ch.y);
                  gEdges.appendChild(edge);
                  const base = minimalEdgeLabel("chan_send_commit", chNameEff);
                  const lbl = text(
                    (sender.x + ch.x) / 2,
                    (sender.y + ch.y) / 2,
                    base
                  );
                  gLabels.appendChild(lbl);
                  edObj = {
                    path: edge,
                    label: lbl,
                    a: sender,
                    b: ch,
                  kind: "send",
                  ch: chNameEff,
                  chKey,
                  g: e.peer_g,
                  baseText: base,
                };
                  edge._ed = edObj;
                  lbl._ed = edObj;
                  drawnEdges.push(edObj);
                  edgesByKey.set(key, edObj);
                  edObj.label.textContent = edObj.baseText + idsSuffix(edObj);
                  updateEdge(edObj);
                  resolveLabelOverlaps();
                }
                try {
                  edObj.baseText = minimalEdgeLabel(
                    "chan_send_commit",
                    chNameEff
                  );
                  edObj.label.textContent = edObj.baseText + idsSuffix(edObj);
                  edObj.path.classList.add("commit");
                  recordEdgeTiming(edObj, e);
                } catch {}
                edObj.commitId = e.id || "";
                // Causal overlay (sender ⇒ receiver), if enabled
                try {
                  const cz = document.getElementById("toggleCausalLive");
                  if (cz && cz.checked) {
                    const cpath = line(sender.x, sender.y, gg.x, gg.y);
                    cpath.classList.add("edge", "causal");
                    gCausal.appendChild(cpath);
                    const lbl = text(
                      (sender.x + gg.x) / 2,
                      (sender.y + gg.y) / 2 - 10,
                      `${e.channel || ""}${
                        e.msg_id != null ? ` #${e.msg_id}` : ""
                      }`
                    );
                    gLabels.appendChild(lbl);
                    const cobj = {
                      path: cpath,
                      label: lbl,
                      a: sender,
                      b: gg,
                      kind: "causal",
                    };
                    causalEdges.push(cobj);
                    updateEdge(cobj);
                  }
                } catch {}
                break;
              }
              // Otherwise, fall through to legacy path
            }
            if (tokenAnimationAllowed(e)) {
              if (
                meta.role === "send" &&
                (meta.phase === "attempt" || meta.phase === "plain")
              )
                onSend(chNameEff, e.g, t, e.value);
              if (
                meta.role === "recv" &&
                (meta.phase === "complete" || meta.phase === "plain")
              )
                onRecv(chNameEff, e.g, t, e.value);
            }
            // Upgrade the recv attempt edge to commit if we have a matching attempt_id; stash otherwise
            if (kind === "chan_recv_commit") {
              if (e.attempt_id && attemptEdges.has(e.attempt_id)) {
                try {
                  const rcvEdge = attemptEdges.get(e.attempt_id);
                  rcvEdge.path.classList.remove("tentative");
                  rcvEdge.path.classList.add("commit");
                  const deltaTxt =
                    typeof e.delta_ms === "number"
                      ? ` Δ=${format(e.delta_ms)}ms`
                      : "";
                  rcvEdge.baseText = minimalEdgeLabel(
                    "chan_recv_commit",
                    rcvEdge.ch || chNameEff
                  );
                  rcvEdge.label.textContent =
                    rcvEdge.baseText + idsSuffix(rcvEdge);
                  recordEdgeTiming(rcvEdge, e);
                  updateEdge(rcvEdge);
                } catch {}
              } else if (e.attempt_id) {
                pendingRecvCommits.set(e.attempt_id, e);
              }
            }
            // Draw edge once per (role,g,ch). Prefer drawing on attempt/plain; skip drawing for 'complete' to avoid duplicates.
            const key = `${meta.role}:${e.g}:${chKey}`;
            let edObj = edgesByKey.get(key);
            // Reconcile: if this is a send_attempt and a committed edge already exists, bind attempt_id to it instead of drawing a dashed one
            if (
              edObj &&
              meta.role === "send" &&
              (kind === "chan_send_attempt" || kind === "send_attempt")
            ) {
              try {
                edObj.attemptId = e.id || edObj.attemptId;
                attemptEdges.set(e.id, edObj);
                edObj.label.textContent =
                  (edObj.baseText || edObj.label.textContent) +
                  idsSuffix(edObj);
              } catch {}
              break;
            }
            if (!edObj && meta.phase !== "complete") {
              const edge = line(gg.x, gg.y, ch.x, ch.y);
              try {
                if (e.source === "synth" || e.Source === "synth")
                  edge.classList.add("synth");
              } catch {}
              gEdges.appendChild(edge);
              // label text
              const dx = ch.x - gg.x,
                dy = ch.y - gg.y;
              const len = Math.hypot(dx, dy) || 1;
              let nx = -dy / len,
                ny = dx / len;
              let off = labelOffset;
              try {
                const rect = svg.getBoundingClientRect();
                const notes = document.getElementById("notesPanel");
                const nrect =
                  notes && notes.style.display !== "none"
                    ? notes.getBoundingClientRect()
                    : null;
                const rightLimit = nrect ? nrect.left - 8 : rect.width - 8;
                const mxw = (gg.x + ch.x) / 2;
                const screenMidX = view.scale * mxw + view.panX;
                const testX = screenMidX + nx * off * view.scale;
                if (testX > rightLimit) {
                  const extra = (screenMidX - rightLimit) / view.scale + 12;
                  off = -Math.max(Math.abs(off), extra);
                }
                if (testX < 8) off = Math.abs(off);
              } catch {}
              const lx = (gg.x + ch.x) / 2 + nx * off;
              const ly = (gg.y + ch.y) / 2 + ny * off;
              const base = minimalEdgeLabel(kind, chNameEff);
              const lbl = text(lx, ly, base);
              lbl.setAttribute("text-anchor", "middle");
              try {
                if (e.source === "synth" || e.Source === "synth")
                  lbl.classList.add("synth");
              } catch {}
              gLabels.appendChild(lbl);
              const a = meta.role === "send" ? gg : ch,
                b = meta.role === "send" ? ch : gg;
              edObj = {
                path: edge,
                label: lbl,
                a,
                b,
                kind: meta.role === "send" ? "send" : "recv",
                ch: chNameEff,
                chKey,
                g: e.g,
                baseText: base,
                ptr: e.ch_ptr || null,
              };
              edge._ed = edObj;
              lbl._ed = edObj;
              drawnEdges.push(edObj);
              recordEdgeTiming(edObj, e);
              // Mark tentative for attempts
              if (
                kind === "chan_send_attempt" ||
                kind === "send_attempt" ||
                kind === "chan_recv_attempt"
              ) {
                try {
                  edge.classList.add("tentative");
                } catch {}
                edObj.attemptId = e.id || "";
              }
              // If we received a commit before the attempt edge existed, upgrade now.
              try {
                const aid = edObj.attemptId;
                if (aid && pendingRecvCommits.has(aid)) {
                  const commitEv = pendingRecvCommits.get(aid);
                  pendingRecvCommits.delete(aid);

                  edObj.path.classList.remove("tentative");
                  edObj.path.classList.add("commit");
                  edObj.commitId = commitEv.id || "";

                  // Optional: record commit timing on the same edge
                  recordEdgeTiming(edObj, commitEv);
                  edObj.label.textContent =
                    (edObj.baseText || edObj.label.textContent) +
                    idsSuffix(edObj);
                  updateEdge(edObj);
                  resolveLabelOverlaps();
                }
              } catch {}

              // Remember attempt edge for future commit upgrades (send or recv)
              try {
                if (
                  e.id &&
                  (kind === "chan_send_attempt" || kind === "chan_recv_attempt")
                )
                  attemptEdges.set(e.id, edObj);
              } catch {}
              // Apply IDs suffix if enabled
              try {
                edObj.label.textContent = edObj.baseText + idsSuffix(edObj);
              } catch {}
              // If this event carries an attempt id, remember edge for upgrade
              try {
                if (
                  e.id &&
                  (kind === "chan_send_attempt" || kind === "chan_recv_attempt")
                )
                  attemptEdges.set(e.id, edObj);
              } catch {}
              // Assign per-source lanes to fan out edges from the same node
              try {
                const siblings = drawnEdges.filter(
                  (ed) => ed.a === a && ed.kind === edObj.kind
                );
                const n = siblings.length;
                siblings.forEach((ed, idx) => {
                  ed.curve = (idx - (n - 1) / 2) * 14;
                  updateEdge(ed);
                });
              } catch {}
              edgesByKey.set(key, edObj);
              // Ensure initial label placement uses curve-aware geometry
              updateEdge(edObj);
              // Decorate if currently blocked on this specific op
              try {
                const binfo = state.blocked.get(e.g);
                const bk = `${e.g}:${edObj.chKey}:${edObj.kind}`;
                if (
                  binfo &&
                  binfo.start != null &&
                  blockedIntentByKey.has(bk)
                ) {
                  edObj.path.classList.add("blocked");
                  blockedEdgeByKey.set(bk, edObj);
                }
              } catch {}
              makeSelectableEdge(edge, lbl);
              resolveLabelOverlaps();
            }
            // Animate when we see an event
            if (animate && edObj && tokenAnimationAllowed(e)) {
              if (meta.role === "send")
                animateDot(
                  edObj.a.x,
                  edObj.a.y,
                  edObj.b.x,
                  edObj.b.y,
                  "send",
                  350
                );
              else
                animateDot(
                  edObj.b.x,
                  edObj.b.y,
                  edObj.a.x,
                  edObj.a.y,
                  "recv",
                  350
                );
            }
            break;
          }
        }
        try {
          updateBundles();
        } catch {}
      }

      // Simple tooltip helpers for edges
      (function () {
        const tip = document.getElementById("edgeTip");
        if (!tip) return;
        function showTip(html, x, y) {
          tip.style.display = "block";
          tip.style.left = x + 12 + "px";
          tip.style.top = y + 12 + "px";
          if (html != null) tip.innerHTML = html;
        }

        function hideTip() {
          tip.style.display = "none";
        }
        // Wire globally
        window._gtvShowEdgeTip = showTip;
        window._gtvHideEdgeTip = hideTip;
      })();

      function chName(e) {
        return e.channel || inferCh(e.event);
      }
      function chId(e) {
        try {
          const sp = document.getElementById("toggleSplitLive");
          if (sp && sp.checked && e.channel_key) return e.channel_key;
        } catch {}
        return e.ch_ptr || chName(e);
      }
      function inferCh(ev) {
        // fallback if parser omitted channel
        if (ev.startsWith("ping")) return "ping";
        if (ev.startsWith("pong")) return "pong";
        return "chan";
      }

      /* ========= Load & bootstrap ========= */
      function normalizeIncomingEvent(e) {
        if (!e || typeof e !== "object") return null;
        return {
          time_ms: e.time_ms ?? e.t ?? e.TimeMs ?? e.timeMs ?? 0,
          time_ns: e.time_ns ?? e.timeNs ?? e.TimeNs ?? null,
          dt: 0,
          event: e.event ?? e.Event ?? "",
          g: e.g ?? e.gid ?? e.G ?? null,

          // user-visible channel label (logical name)
          channel: e.channel ?? e.ch ?? e.Channel ?? null,

          // pointer identity
          ch_ptr: e.ch_ptr ?? e.chPtr ?? e.ChPtr ?? null,

          // IMPORTANT: accept all known spellings of channel key
          channel_key:
            e.channel_key ??
            e.channelKey ??
            e.ChannelKey ??
            e.ch_key ??
            e.chKey ??
            e.ChKey ??
            null,

          value: e.value ?? e.Value ?? null,
          role: e.role ?? e.Role ?? null,
          func: e.func ?? e.Func ?? null,

          // passthrough if you use them elsewhere
          id: e.id ?? e.ID ?? null,
          attempt_id: e.attempt_id ?? e.attemptId ?? e.AttemptID ?? null,
          select_id: e.select_id ?? e.selectId ?? e.SelectID ?? null,
          peer_g: e.peer_g ?? e.peerG ?? e.PeerG ?? null,
          msg_id: e.msg_id ?? e.msgId ?? e.MsgID ?? null,
          seq: e.seq ?? e.Seq ?? null,

          source: e.source ?? e.Source ?? null,
          diagnostic_only: e.diagnostic_only ?? e.diagnosticOnly ?? false,
          delta_ms: e.delta_ms ?? e.deltaMs ?? null,
          cap: e.cap ?? e.Cap ?? null,
          elem_type: e.elem_type ?? e.elemType ?? e.ElemType ?? null,
        };
      }

      async function loadJSON(text) {
        // Accept either {events:[...]} or plain array
        let data = JSON.parse(text);
        const arr = Array.isArray(data) ? data : data.events || [];
        const warnings = Array.isArray(data?.warnings) ? data.warnings : [];
        if (!Array.isArray(arr) || arr.length === 0) {
          alert(
            "This JSON has no events array. Please load trace.json (not logs)."
          );
          return;
        }
        if (!("event" in arr[0]) && "message" in arr[0]) {
          alert(
            "This looks like trace.logs.json (raw logs). Please load trace.json."
          );
          return;
        }
        rawEvents = arr;
        // Normalize fields (backward-compat with your trace.json)
        events = arr
          .map((entry, idx) => {
            const normalized = normalizeIncomingEvent(entry);
            if (!normalized) return null;
            if (!normalized.time_ns) {
              normalized.time_ns = Math.round(normalized.time_ms * 1e6);
            }
            if (!normalized.seq) {
              normalized.seq = idx + 1;
            }
            return normalized;

        let minX = Infinity,
