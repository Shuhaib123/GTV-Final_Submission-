        const batch = liveBuffer.splice(0);
        for (const item of batch) {
          processLiveEvent(item.evt, true);
        }
      }
      function processLiveEvent(evt, allowAnimate) {
        if (!t0 || evt.time_ms < t0) {
          t0 = evt.time_ms;
          events.forEach((item) => {
            item.dt = item.time_ms - t0;
          });
        }
        evt.dt = evt.time_ms - t0;

        let insertIdx = insertSortedEvent(events, evt);
        if (events.length > LIVE_EVENT_CAP) {
          const overflow = events.length - LIVE_EVENT_CAP;
          events.splice(0, overflow);
          if (insertIdx < overflow) {
            insertIdx = 0;
          } else {
            insertIdx -= overflow;
          }
          ui.nextIdx = Math.max(0, ui.nextIdx - overflow);
        }
        if (insertIdx <= ui.nextIdx) {
          try {
            fire(evt, allowAnimate && ui.playing);
          } catch {}
          ui.nextIdx += 1;
          lastEmittedKey = { time_ns: evt.time_ns, seq: evt.seq };
        }
        T = events.length ? events[events.length - 1].dt : 0;
        const TARGET_MS = 4000;
        ui.scale = T > 0 ? T / TARGET_MS : 1;
        const stats = document.getElementById("hudStats");
        if (stats) {
          const capped = events.length >= LIVE_EVENT_CAP ? " (capped)" : "";
          stats.textContent = `events: ${events.length}${capped} • duration: ${format(
            T
          )}ms`;
        }
        requestLiveRebuild();
        if (!ui.playing && events.length === 1 && !suppressAutoPlay) {
          try {
            setPlaying(true);
          } catch {}
        }
        if (ui.playing) {
          try {
            updateBundles();
          } catch {}
        }
      }
      function beginSnapshot(payload) {
        snapshotActive = true;
        snapshotApplied = false;
        suppressAutoPlay = true;
        liveBuffer.length = 0;
        lastEmittedKey = null;
        if (liveBufferTimer) {
          clearTimeout(liveBufferTimer);
          liveBufferTimer = null;
        }
        try {
          setPlaying(false);
        } catch {}
        stopFlowLoop();
        renderWarningsPanel([]);
        events.length = 0;
        rawEvents.length = 0;
        allChannels = [];
        t0 = 0;
        T = 0;
        ui.simNow = 0;
        ui.nextIdx = 0;
        resetAll();
        const stats = document.getElementById("hudStats");
        if (stats) stats.textContent = `events: 0 • duration: 0ms`;
        const statusEl = document.getElementById("liveStatus");
        if (statusEl) {
          statusEl.textContent = "Applying snapshot…";
          statusEl.style.color = "#9bd67b";
        }
      }
      function applySnapshotPayload(payload) {
        if (!snapshotActive) return;
        const arr =
          (payload && payload.events) || (payload && payload.Events) || [];
        if (!Array.isArray(arr)) return;
        for (const evt of arr) {
          if (evt && typeof evt === "object") {
            handleLiveTimelineEvent(evt);
          }
        }
        requestLiveRebuild();
        if (arr.length) snapshotApplied = true;
      }
      function applySnapshotEvent(payload) {
        if (!snapshotActive) return;
        const evt = (payload && payload.event) || payload;
        if (evt && typeof evt === "object") {
          handleLiveTimelineEvent(evt);
          requestLiveRebuild();
          snapshotApplied = true;
        }
      }
      function endSnapshot() {
        snapshotActive = false;
        suppressAutoPlay = false;
        if (snapshotApplied && events.length) {
          rebuildSceneFromEvents();
          try {
            setPlaying(true);
          } catch {}
        }
        const statusEl = document.getElementById("liveStatus");
        if (statusEl) {
          statusEl.textContent = "Live: connected";
          statusEl.style.color = "#9bd67b";
        }
      }
      function dispatchLiveMessage(msg) {
        if (!msg || typeof msg !== "object") return;
        if (Array.isArray(msg)) {
          for (const item of msg) {
            dispatchLiveMessage(item);
          }
          return;
        }
        if (msg.type) {
          handleControlMessage(msg.type, msg);
          return;
        }
        handleLiveTimelineEvent(msg);
      }

      function connectWS(url) {
        ws = new WebSocket(url);
        const statusEl = document.getElementById("liveStatus");
        ws.onopen = () => {
          isLive = true;
          if (statusEl) {
            statusEl.style.display = "";
            statusEl.textContent = "Waiting for events…";
            statusEl.style.color = "#9bd67b";
          }
          // Start a run on connect
          try {
            ws.send("start");
          } catch {}
        };
        ws.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            dispatchLiveMessage(msg);
          } catch (err) {
            console.warn("live ws parse error", err);
          }
        };
        ws.onclose = () => {
          console.log("trace stream closed");
          isLive = false;
          if (statusEl) {
            statusEl.style.display = "";
            statusEl.textContent = "Live: disconnected";
            statusEl.style.color = "#ffb366";
          }
        };
      }
      function closeLiveConnection() {
        if (ws) {
          try {
            ws.close();
          } catch {}
          ws = null;
        }
        isLive = false;
      }
      function buildLiveURL(params) {
        const scheme = location.protocol === "https:" ? "wss" : "ws";
        return `${scheme}://${location.host}/trace?${params.toString()}`;
      }
      function startLiveConnection(params) {
        closeLiveConnection();
        connectWS(buildLiveURL(params));
      }

      // Auto-connect when served by gtv-live server
      window.addEventListener("load", () => {
        // Apply saved theme
        try {
          const t = localStorage.getItem("gtvTheme");
          if (t === "light")
            document.documentElement.classList.add("theme-light");
        } catch {}
        try {
          const params = new URLSearchParams(location.search);
          const name = (params.get("name") || "").trim().toLowerCase();
          const synth = params.get("synth") || "1";
          const drop = params.get("drop_block_no_ch") || "0";
          let bcMode = (params.get("bc_mode") || "").trim().toLowerCase();
          if (!bcMode) {
            try {
              bcMode = (localStorage.getItem("gtvBcMode") || "").toLowerCase();
            } catch {}
          }
          // reflect into UI
          try {
            const s = document.getElementById("toggleSynthLive");
            if (s) s.checked = synth === "1" || synth === "true";
            const d = document.getElementById("toggleDropLive");
            if (d) d.checked = drop === "1" || drop === "true";
            const m = document.getElementById("bcModeLive");
            if (m) m.value = bcMode || "";
            const wl = document.getElementById("wlLabel");
            if (wl) wl.textContent = name ? `Workload: ${name}` : "";
            const idsBox = document.getElementById("toggleIDsLive");
            if (idsBox) {
              idsBox.checked = showIDsLive;
              idsBox.addEventListener("change", (ev) => {
                showIDsLive = !!ev.target.checked;
                saveIDsPref(showIDsLive);
                try {
                  drawnEdges.forEach((ed) => {
                    if (ed.baseText)
                      ed.label.textContent = ed.baseText + idsSuffix(ed);
                  });
                } catch {}
              });
            }
          } catch {}
          const q = new URLSearchParams({
            name,
            synth,
            drop_block_no_ch: drop,
          });
          if (bcMode) q.set("bc_mode", bcMode);
          try {
            if (bcMode) localStorage.setItem("gtvBcMode", bcMode);
          } catch {}
          startLiveConnection(q);
          // reconnect on synth/drop toggle to re-run with server options
          function reconnectFromUI() {
            const s = document.getElementById("toggleSynthLive");
            const d = document.getElementById("toggleDropLive");
            const m = document.getElementById("bcModeLive");
            const synthVal = s && s.checked ? "1" : "0";
            const dropVal = d && d.checked ? "1" : "0";
            const modeVal = m && m.value ? m.value : "";
            // update URL bar
            const nq = new URLSearchParams({
              name,
              synth: synthVal,
              drop_block_no_ch: dropVal,
            });
            if (modeVal) nq.set("bc_mode", modeVal);
            try {
              if (modeVal) localStorage.setItem("gtvBcMode", modeVal);
              else localStorage.removeItem("gtvBcMode");
            } catch {}
            try {
              history.replaceState(null, "", "?" + nq.toString());
            } catch {}
            // close previous and connect
            // soft reset timeline/scene
            try {
              events.length = 0;
              t0 = 0;
              T = 0;
              ui.playing = false;
              liveBuffer.length = 0;
              lastEmittedKey = null;
              if (liveBufferTimer) {
                clearTimeout(liveBufferTimer);
                liveBufferTimer = null;
              }
              const clear = (id) => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = "";
              };
              clear("edges");
              clear("anims");
              clear("nodes");
              clear("labels");
              clear("notes");
            } catch {}
            startLiveConnection(nq);
          }
          try {
            const sBox = document.getElementById("toggleSynthLive");
            if (sBox) sBox.addEventListener("change", reconnectFromUI);
            const dBox = document.getElementById("toggleDropLive");
            if (dBox) dBox.addEventListener("change", reconnectFromUI);
            const mSel = document.getElementById("bcModeLive");
            if (mSel) mSel.addEventListener("change", reconnectFromUI);
          } catch {}
        } catch {}
      });
      // Export current SVG to PNG
      function computeLiveBounds() {
        const nodes = [
          ...state.nodes.goroutines.values(),
          ...state.nodes.channels.values(),
        ];
        if (!nodes.length) return null;
        let minX = Infinity,
          maxX = -Infinity,
          minY = Infinity,
          maxY = -Infinity;
        nodes.forEach((n) => {
          const x = n.x ?? 0;
          const y = n.y ?? 0;
          const pad = n.kind === "channel" ? 40 : 34;
          minX = Math.min(minX, x - pad);
          maxX = Math.max(maxX, x + pad);
          minY = Math.min(minY, y - pad);
          maxY = Math.max(maxY, y + pad);
        });
        if (minX >= maxX || minY >= maxY) return null;
        return {
          x: minX - 32,
          y: minY - 32,
          width: maxX - minX + 64,
          height: maxY - minY + 64,
        };
      }

      function downloadPNGLive(filename = "graph-live.png") {
        try {
          const svg = document.getElementById("svg");
          // Compute full-content bounds (ignore current pan/zoom)
          const world = document.getElementById("world");
          let bbox;
          try {
            bbox = world.getBBox();
          } catch {
            bbox = null;
          }
          const nodeBounds = computeLiveBounds();
          if (
            !nodeBounds ||
            !isFinite(nodeBounds.width) ||
            !isFinite(nodeBounds.height) ||
            nodeBounds.width <= 0 ||
            nodeBounds.height <= 0
          ) {
            const rect = svg.getBoundingClientRect();
            bbox = { x: 0, y: 0, width: rect.width, height: rect.height };
          } else {
            bbox = nodeBounds;
          }
          const width = Math.max(1, Math.ceil(bbox.width));
          const height = Math.max(1, Math.ceil(bbox.height));
          const clone = svg.cloneNode(true);
          // Copy computed styles from the original SVG elements into the clone so CSS vars/classes resolve.
          (function copyStyles(orig, dup) {
            const props = [
              "fill",
              "stroke",
              "stroke-width",
              "stroke-dasharray",
              "stroke-linecap",
              "stroke-linejoin",
              "opacity",
              "font-size",
              "font-family",
              "font-weight",
              "text-anchor",
            ];
            const apply = (o, c) => {
              if (!o || !c) return;
              const cs = getComputedStyle(o);
              props.forEach((p) => {
                const v = cs.getPropertyValue(p);
                if (v) c.style.setProperty(p, v);
              });
              const oc = o.children || [],
                cc = c.children || [];
              for (let i = 0; i < oc.length && i < cc.length; i++)
                apply(oc[i], cc[i]);
            };
            apply(svg, clone);
          })(svg, clone);
          // Remove pan/zoom from cloned world and set viewBox to full content
          try {
            const cWorld = clone.querySelector("#world");
            if (cWorld) cWorld.setAttribute("transform", "");
            clone.setAttribute(
              "viewBox",
              `${bbox.x} ${bbox.y} ${Math.max(1, bbox.width)} ${Math.max(
                1,
                bbox.height
              )}`
            );
          } catch {}
          clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
          clone.setAttribute("width", String(width));
          clone.setAttribute("height", String(height));
          const data = new XMLSerializer().serializeToString(clone);
          const blob = new Blob([data], {
            type: "image/svg+xml;charset=utf-8",
          });
          const url = URL.createObjectURL(blob);
          const img = new Image();
          img.onload = () => {
            const scale = Math.max(2, window.devicePixelRatio || 2);
            const canvas = document.createElement("canvas");
            canvas.width = width * scale;
            canvas.height = height * scale;
            const ctx = canvas.getContext("2d");
            ctx.fillStyle =
              getComputedStyle(document.body).backgroundColor || "#0b1020";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            URL.revokeObjectURL(url);
            canvas.toBlob((png) => {
              if (!png) return;
              const a = document.createElement("a");
              a.download = filename;
              a.href = URL.createObjectURL(png);
              a.click();
              setTimeout(() => URL.revokeObjectURL(a.href), 500);
            }, "image/png");
          };
          img.onerror = () => URL.revokeObjectURL(url);
          img.src = url;
        } catch (e) {
          console.warn("download PNG failed:", e);
        }
      }

      document.getElementById("btnTheme").onclick = () => {
        const isLight =
          document.documentElement.classList.toggle("theme-light");
        try {
          localStorage.setItem("gtvTheme", isLight ? "light" : "dark");
        } catch {}
      };
      try {
        document.getElementById("btnDownload").onclick = () =>
          downloadPNGLive("graph-live.png");
      } catch {}

      // Add a Re-run button to trigger another live run without reloading
      (function addRerunButton() {
        const btn = document.createElement("button");
        btn.textContent = "Re-run";
        btn.title = "Start a new live run";
        btn.onclick = () => {
          // Clear current scene and events, then request a new run
          try {
            ui.animating = true;
            setPlaying(false);
          } catch {}
          stopFlowLoop();
          events = [];
          rawEvents = [];
          allChannels = [];
          t0 = 0;
          T = 0;
          $("#hudStats").textContent = `events: 0 • duration: 0ms`;
          resetAll();
          try {
            ws && ws.send("start");
          } catch {}
        };
        document.querySelector(".toolbar").appendChild(btn);
      })();
    </script>
  </body>
